version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/weights:/app/weights
      - ./backend/dataset:/app/dataset
    # Use GPU if available, else cpu fallback works naturally in torch 
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    restart: always

  frontend-test:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./frontend-test:/usr/share/nginx/html
    restart: always
